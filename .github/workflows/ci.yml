name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Type check
        run: bunx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Run tests
        run: bunx jest --ci --coverage --maxWorkers=2
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
          MONGO_USER_DATABASE_URL: "mongodb://root:password@localhost:27017/yok_logs?authSource=admin"
          BETTER_AUTH_SECRET: "ci-test-secret-key-at-least-32-chars"
          BETTER_AUTH_URL: "http://localhost:3000"
          BETTER_AUTH_BASE_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_MAPBOX_TOKEN: "pk.placeholder"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
          MONGO_USER_DATABASE_URL: "mongodb://root:password@localhost:27017/yok_logs?authSource=admin"
          BETTER_AUTH_SECRET: "ci-build-placeholder-secret-32chars"
          BETTER_AUTH_URL: "http://localhost:3000"
          BETTER_AUTH_BASE_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_MAPBOX_TOKEN: "pk.placeholder"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
